version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
      POSTGRES_DB: bookshelf_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookshelf"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile   # правильный путь от корня
    environment:
      NODE_ENV: test
      DB_USER: bookshelf
      DB_PASSWORD: bookshelf
      DB_NAME: bookshelf_test
      DB_HOST: db
      DB_PORT: 5432
      PORT: 5000
      JWT_SECRET: test_secret
      JWT_EXPIRES_IN: 1h
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && node server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_URL: http://backend:5000   # теперь правильно
    ports:
      - "3000:80"   # внутри контейнера фронт на 80, наружу отдаём на 3000 для тестов
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5