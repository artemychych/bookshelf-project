name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: cd frontend && npm install
      - name: Run linter
        run: cd frontend && npm run lint || echo "No lint script"
      - name: Run unit tests
        run: cd frontend && npm test || echo "No tests"

  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend dependencies
        run: cd backend && npm install
      - name: Run linter
        run: cd backend && npm run lint || echo "No lint script"
      - name: Run unit tests
        run: cd backend && npm test || echo "No tests"

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [lint-and-test-frontend, lint-and-test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Install Playwright
        run: |
          cd e2e
          npm install
          npx playwright install --with-deps chromium
      - name: Start test environment
        run: docker compose -f docker-compose.e2e.yml up -d --build
      - name: Show logs if backend failed
        if: failure() || always()
        run: docker compose -f docker-compose.e2e.yml logs backend
      - name: Wait for services to be healthy
        run: |
          for service in db backend frontend; do
            echo "Waiting for $service..."
            while [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose -f docker-compose.e2e.yml ps -q $service))" != "healthy" ]; do
              sleep 2
            done
          done
      - name: Run E2E tests
        run: cd e2e && npm test
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.e2e.yml down

  build-docker:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend image
        run: docker build -t bookshelf-frontend:latest -f docker/frontend.Dockerfile .
      - name: Build backend image
        run: docker build -t bookshelf-backend:latest -f docker/backend.Dockerfile .
      - name: (Optional) Push to registry
        run: echo "Images built successfully"

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: Sync files via rsync
        run: |
          rsync -avz --delete --exclude='.git' --exclude='node_modules' --exclude='e2e' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/
      - name: Deploy and run migrations
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d --build
            echo "Waiting for backend to be healthy..."
            for i in {1..30}; do
              BACKEND_ID=$(docker compose -f docker-compose.prod.yml ps -q backend 2>/dev/null)
              if [ -n "$BACKEND_ID" ]; then
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' $BACKEND_ID 2>/dev/null)
                if [ "$STATUS" = "healthy" ]; then
                  echo "Backend is healthy"
                  break
                fi
              fi
              sleep 2
            done

            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T backend npm run migrate

            sleep 5
            for service in backend frontend; do
              SERVICE_ID=$(docker compose -f docker-compose.prod.yml ps -q $service 2>/dev/null)
              if [ -n "$SERVICE_ID" ]; then
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' $SERVICE_ID 2>/dev/null)
                if [ "$STATUS" != "healthy" ]; then
                  echo "Service $service is not healthy (status: $STATUS)"
                  docker compose -f docker-compose.prod.yml logs $service
                  exit 1
                fi
              else
                echo "Service $service not running"
                exit 1
              fi
            done
            echo "Deploy successful"
          ENDSSH
      - name: Public health check
        run: |
          curl --fail --retry 10 --retry-delay 5 http://${{ secrets.SSH_HOST }}:6636/api/health