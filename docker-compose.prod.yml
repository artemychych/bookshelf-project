version: '3.8'

services:
  db:
    image: postgres:16
    container_name: bookshelf_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"   # БД доступна только локально для бэкапов
    networks:
      - bookshelf_network

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: bookshelf_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_HOST: db                # важно: имя сервиса, а не localhost
      DB_PORT: 5432
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    # Не открываем порт бэкенда наружу – он работает только внутри сети Docker
    networks:
      - bookshelf_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: bookshelf_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "6636:80"                  # Открываем порт 80 на хосте
    networks:
      - bookshelf_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  bookshelf_network:
    driver: bridge